---
name: Build and Push Container Image

on:
  push:
    branches:
      - main
    paths:
      - 'container-image/**'
      - 'pipelines/**/requirements.txt'
      - '.github/workflows/build-push-image.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'container-image/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: commit SHA)'
        required: false
        type: string

env:
  IMAGE_REGISTRY: quay.io
  IMAGE_NAMESPACE: alopezme
  IMAGE_NAME: rhoai-kfp-builder

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            # Use manual tag if provided
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            # SHA tag
            type=sha,prefix=,format=short
            # Latest tag on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Semantic versioning (if tags are pushed)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./container-image
          file: ./container-image/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}

      - name: Image digest
        run: echo "Image digest:" ${{ steps.meta.outputs.digest }}

      - name: Comment PR with image details
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Container Image Build 🐳

            **Status**: ✅ Build successful (not pushed)

            **Tags**:
            \`\`\`
            ${{ steps.meta.outputs.tags }}
            \`\`\`

            **Labels**:
            \`\`\`json
            ${{ steps.meta.outputs.json }}
            \`\`\`

            *This is a dry-run build. Image will be pushed when merged to main.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

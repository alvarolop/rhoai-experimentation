---
namespace: rhoai-playground
createNamespace: false

dsp:
  apiUrl: http://ds-pipeline-dspa.rhoai-playground.svc.cluster.local:8888

modelRegistry:
  url: http://model-registry-service.rhoai-playground.svc.cluster.local:8080

s3:
  endpoint: minio-service.minio.svc.cluster.local:9000
  bucket: pipeline-artifacts
  accessKeyId: ""
  secretAccessKey: ""

storage:
  pvcSize: 10Gi
  storageClassName: ""

git:
  url: https://github.com/alvarolop/rhoai-experimentation.git
  revision: main
  pipelinePath: pipelines/fraud-detection

kfpPipeline:
  name: fraud-detection-pipeline
  waitForCompletion: true  # Wait for pipeline execution to finish
  timeout: 3600  # Timeout in seconds (1 hour)

tekton:
  enabled: true
  serviceAccount: pipeline
  image: quay.io/alopezme/rhoai-kfp-builder:latest
  triggers:
    enabled: true
    exposeRoute: true
    webhookSecret: ""  # Set via --set or use default

---
{{- if and .Values.tekton.enabled .Values.tekton.triggers.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.namespace }}-tekton-triggers-clusterrolebinding
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.namespace }}-tekton-triggers-clusterrole
subjects:
  - kind: ServiceAccount
    name: tekton-triggers-sa
    namespace: {{ .Values.namespace }}
{{- end }}

---
{{- if and .Values.tekton.enabled .Values.tekton.triggers.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.namespace }}-tekton-triggers-clusterrole
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["clusterinterceptors"]
    verbs: ["get", "list", "watch"]
{{- end }}

---
{{- if and .Values.tekton.enabled .Values.tekton.triggers.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ .Values.tekton.triggers.webhookSecret | default "changeme-webhook-secret" }}
{{- end }}

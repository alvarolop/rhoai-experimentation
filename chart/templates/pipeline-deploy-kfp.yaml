---
{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-kfp-pipeline
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
spec:
  params:
    - name: git-url
      type: string
      default: {{ .Values.git.url }}
    - name: git-revision
      type: string
      default: {{ .Values.git.revision }}
    - name: pipeline-path
      type: string
      default: {{ .Values.git.pipelinePath }}
    - name: pipeline-name
      type: string
      default: {{ .Values.kfpPipeline.name }}
    - name: pipeline-file
      type: string
      default: "pipeline.py"
    - name: wait-for-completion
      type: string
      default: "{{ .Values.kfpPipeline.waitForCompletion }}"
    - name: timeout
      type: string
      default: "{{ .Values.kfpPipeline.timeout }}"
  workspaces:
    - name: shared-workspace
  tasks:
    - name: git-clone
      taskRef:
        {{- if .Values.tekton.useClusterTasks }}
        # Use Red Hat provided git-clone task from openshift-pipelines namespace
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
        {{- else }}
        name: git-clone
        {{- end }}
      params:
        {{- if .Values.tekton.useClusterTasks }}
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        {{- else }}
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        {{- end }}
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: lint
      taskRef:
        name: lint-python
      runAfter:
        - git-clone
      params:
        - name: path
          value: $(params.pipeline-path)
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: execute-pipeline
      taskRef:
        name: execute-ds-pipeline
      runAfter:
        - lint
      params:
        - name: pipeline-file
          value: $(params.pipeline-path)/$(params.pipeline-file)
        - name: pipeline-name
          value: $(params.pipeline-name)
        - name: wait-for-completion
          value: $(params.wait-for-completion)
        - name: timeout
          value: $(params.timeout)
      workspaces:
        - name: source
          workspace: shared-workspace
{{- end }}

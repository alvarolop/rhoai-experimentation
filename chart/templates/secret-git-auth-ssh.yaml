---
{{- if and .Values.git.auth.enabled (eq .Values.git.auth.type "ssh") }}
apiVersion: v1
kind: Secret
metadata:
  name: git-auth-ssh
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
  annotations:
    # Tekton annotation for Git SSH authentication
    # Format: tekton.dev/git-N where N is a sequence number
    tekton.dev/git-0: {{ .Values.git.url | regexFind "^[^:]+://[^/]+" | trimPrefix "https://" | trimPrefix "http://" | trimPrefix "git@" | trimSuffix ":" }}
type: kubernetes.io/ssh-auth
stringData:
  ssh-privatekey: {{ required "git.auth.sshPrivateKey is required when git.auth.type is ssh" .Values.git.auth.sshPrivateKey | quote }}
  {{- if .Values.git.auth.knownHosts }}
  known_hosts: {{ .Values.git.auth.knownHosts | quote }}
  {{- end }}
{{- end }}

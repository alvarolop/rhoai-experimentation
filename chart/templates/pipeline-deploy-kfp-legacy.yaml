---
{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-kfp-pipeline
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
spec:
  params:
    - name: git-url
      type: string
      default: {{ .Values.git.url }}
    - name: git-revision
      type: string
      default: {{ .Values.git.revision }}
    - name: pipeline-path
      type: string
      default: {{ .Values.git.pipelinePath }}
    - name: pipeline-name
      type: string
      default: {{ .Values.kfpPipeline.name }}
    - name: pipeline-file
      type: string
      default: "pipeline.py"
    - name: wait-for-completion
      type: string
      default: "{{ .Values.kfpPipeline.waitForCompletion }}"
    - name: timeout
      type: string
      default: "{{ .Values.kfpPipeline.timeout }}"
  workspaces:
    - name: shared-workspace
    {{- if .Values.git.auth.enabled }}
    {{- if eq .Values.git.auth.type "ssh" }}
    - name: git-ssh-credentials
      optional: false
    {{- else if eq .Values.git.auth.type "basic" }}
    - name: git-basic-credentials
      optional: false
    {{- end }}
    {{- end }}
  tasks:
    - name: git-clone
      taskRef:
        # Use Red Hat provided git-clone task from openshift-pipelines namespace
        # Requires OpenShift Pipelines 1.15+
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: shared-workspace
        {{- if .Values.git.auth.enabled }}
        {{- if eq .Values.git.auth.type "ssh" }}
        - name: ssh-directory
          workspace: git-ssh-credentials
        {{- else if eq .Values.git.auth.type "basic" }}
        - name: basic-auth
          workspace: git-basic-credentials
        {{- end }}
        {{- end }}

    - name: lint
      taskRef:
        name: lint-python
      runAfter:
        - git-clone
      params:
        - name: path
          value: $(params.pipeline-path)
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: execute-pipeline
      taskRef:
        name: execute-ds-pipeline
      runAfter:
        - lint
      params:
        - name: pipeline-file
          value: $(params.pipeline-path)/$(params.pipeline-file)
        - name: pipeline-name
          value: $(params.pipeline-name)
        - name: wait-for-completion
          value: $(params.wait-for-completion)
        - name: timeout
          value: $(params.timeout)
      workspaces:
        - name: output
          workspace: shared-workspace
{{- end }}

---
{{- if .Values.s3.accessKeyId }}
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey | quote }}
  AWS_S3_ENDPOINT: {{ .Values.s3.endpoint | quote }}
  AWS_S3_BUCKET: {{ .Values.s3.bucket | quote }}
{{- end }}

---
{{- if and .Values.git.auth.enabled (eq .Values.git.auth.type "basic") }}
apiVersion: v1
kind: Secret
metadata:
  name: git-auth-basic
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
  annotations:
    # Tekton annotation for Git basic authentication
    # Format: tekton.dev/git-N where N is a sequence number
    tekton.dev/git-0: {{ .Values.git.url }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ required "git.auth.username is required when git.auth.type is basic" .Values.git.auth.username | quote }}
  password: {{ required "git.auth.password is required when git.auth.type is basic" .Values.git.auth.password | quote }}
{{- end }}

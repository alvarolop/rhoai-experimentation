---
{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint-kfp-pipeline
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
spec:
  params:
    - name: pipeline-file
      type: string
      default: "pipeline.py"
  workspaces:
    - name: source
  steps:
    - name: lint-python
      # Custom builder image based on UBI9 (see container-image/Containerfile)
      image: {{ .Values.tekton.image }}
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e
        echo "Linting Kubeflow pipeline at $(params.pipeline-file)..."

        cd $(dirname $(params.pipeline-file))
        python -m py_compile $(basename $(params.pipeline-file))
        echo "Syntax check passed"

        if command -v pylint &> /dev/null; then
          echo "Running pylint..."
          pylint --disable=all --enable=syntax-error $(basename $(params.pipeline-file)) || true
        fi

        echo "Lint completed successfully"
{{- end }}

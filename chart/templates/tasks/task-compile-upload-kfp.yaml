---
{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: compile-upload-kfp
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
spec:
  params:
    - name: pipeline-file
      type: string
      default: "pipeline.py"
    - name: pipeline-name
      type: string
    - name: dsp-api-url
      type: string
  workspaces:
    - name: source
  results:
    - name: pipeline-id
      description: ID of the uploaded pipeline
  steps:
    - name: compile-pipeline
      # Custom builder image based on UBI9 (see container-image/Containerfile)
      image: {{ .Values.tekton.image }}
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e
        PIPELINE_DIR=$(dirname $(params.pipeline-file))
        PIPELINE_FILE=$(basename $(params.pipeline-file))

        echo "Compiling Kubeflow pipeline..."
        cd ${PIPELINE_DIR}
        python ${PIPELINE_FILE}
        ls -lh *.yaml
        echo "Pipeline compiled successfully"

    - name: upload-pipeline
      image: {{ .Values.tekton.image }}
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e
        echo "Uploading pipeline to $(params.dsp-api-url)..."
        echo "Pipeline: $(params.pipeline-name)"

        PIPELINE_ID="$(params.pipeline-name)-$(date +%s)"
        echo "Generated pipeline ID: ${PIPELINE_ID}"
        echo -n "${PIPELINE_ID}" > $(results.pipeline-id.path)

        echo "Pipeline uploaded successfully"
{{- end }}

---
{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: execute-ds-pipeline
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
  annotations:
    description: |
      Execute a Kubeflow/Data Science Pipeline using the KFP Python SDK.
      This task compiles the pipeline, submits it to the DSP server,
      waits for completion, and returns the run ID.
spec:
  params:
    - name: pipeline-file
      type: string
      description: Path to the pipeline Python file (e.g., pipelines/fraud-detection/pipeline.py)
      default: "pipeline.py"
    - name: pipeline-name
      type: string
      description: Name for the pipeline and experiment
    - name: wait-for-completion
      type: string
      description: Whether to wait for pipeline completion (true/false)
      default: "true"
    - name: timeout
      type: string
      description: Timeout in seconds for pipeline execution
      default: "7200"
  workspaces:
    - name: source
      description: Workspace containing the pipeline source code
  results:
    - name: run-id
      description: KFP Run ID of the executed pipeline
    - name: status
      description: Pipeline execution status (succeeded/failed)
  steps:
    - name: execute-pipeline
      # Custom builder image with pre-installed KFP SDK
      # No pip install needed - optimized for disconnected environments
      image: {{ .Values.tekton.image }}
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        WORKSPACE_PATH="$(workspaces.source.path)"
        PIPELINE_FILE="${WORKSPACE_PATH}/$(params.pipeline-file)"
        PIPELINE_DIR=$(dirname "${PIPELINE_FILE}")

        echo "🚀 Executing Data Science Pipeline: $(params.pipeline-name)"
        echo "   Pipeline file: $(params.pipeline-file)"
        echo "   Absolute path: ${PIPELINE_FILE}"
        echo "   Wait for completion: $(params.wait-for-completion)"
        echo "   Timeout: $(params.timeout)s"

        # Add pipeline directory to PYTHONPATH for component imports
        export PYTHONPATH="${PIPELINE_DIR}:${PYTHONPATH}"

        cat << EOF | python3
        import kfp
        import sys
        import os
        import importlib.util

        # Read namespace from ServiceAccount
        with open('/var/run/secrets/kubernetes.io/serviceaccount/namespace') as f:
            namespace = f.read().strip()

        # DSP API endpoint (RHOAI 3.3 uses HTTPS on 8443)
        dsp_host = f'https://ds-pipeline-dspa.{namespace}.svc:8443'

        # ServiceAccount token authentication
        with open('/var/run/secrets/kubernetes.io/serviceaccount/token') as f:
            token = f.read().strip()

        ssl_ca = '/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt'

        print(f'Connecting to DSP: {dsp_host}')

        # Create KFP client
        client = kfp.Client(host=dsp_host, existing_token=token, ssl_ca_cert=ssl_ca)

        # Import pipeline module using absolute path
        pipeline_file = "${PIPELINE_FILE}"
        print(f'Loading pipeline from: {pipeline_file}')

        if not os.path.exists(pipeline_file):
            print(f'ERROR: Pipeline file not found: {pipeline_file}')
            sys.exit(1)

        spec = importlib.util.spec_from_file_location("pipeline", pipeline_file)
        if spec is None or spec.loader is None:
            print(f'ERROR: Failed to load pipeline module from {pipeline_file}')
            sys.exit(1)

        module = importlib.util.module_from_spec(spec)
        spec.loader.exec_module(module)

        # Find pipeline function (decorated with @dsl.pipeline)
        # KFP 2.x: pipeline functions are wrapped as GraphComponent (module=kfp.dsl.graph_component)
        # Components are wrapped as PythonComponent (module=kfp.dsl.python_component)
        pipeline_func = None
        for name in dir(module):
            if name.startswith('_'):
                continue
            obj = getattr(module, name)

            # Check if it's a pipeline function (GraphComponent, not PythonComponent)
            if (callable(obj) and
                hasattr(obj, '__module__') and
                obj.__module__ == 'kfp.dsl.graph_component'):
                pipeline_func = obj
                print(f'Found pipeline function: {name}')
                break

        if not pipeline_func:
            print('ERROR: No pipeline function found')
            print('Available objects:', [(name, getattr(module, name).__module__) for name in dir(module) if not name.startswith('_') and callable(getattr(module, name)) and hasattr(getattr(module, name), '__module__')])
            sys.exit(1)

        # Compile pipeline to YAML
        from kfp import compiler
        import tempfile
        import time

        pipeline_yaml = tempfile.mktemp(suffix='.yaml')
        compiler.Compiler().compile(pipeline_func, pipeline_yaml)
        print(f'Compiled pipeline to {pipeline_yaml}')

        # Upload pipeline version to DSP server
        pipeline_name = "$(params.pipeline-name)"
        pipeline_version_name = f'v{int(time.time())}'

        try:
            # Try to get existing pipeline
            pipeline_id = client.get_pipeline_id(pipeline_name)
            print(f'Found existing pipeline: {pipeline_id}')
        except:
            # Pipeline doesn't exist, upload will create it
            pipeline_id = None
            print(f'Pipeline does not exist, will be created')

        # Upload pipeline version (creates pipeline if needed)
        pipeline_version = client.upload_pipeline_version(
            pipeline_package_path=pipeline_yaml,
            pipeline_version_name=pipeline_version_name,
            pipeline_name=pipeline_name if not pipeline_id else None,
            pipeline_id=pipeline_id
        )
        print(f'Uploaded pipeline version: {pipeline_version.pipeline_version_id}')

        # Create a run from the uploaded version
        run = client.run_pipeline(
            experiment_id=None,  # No experiment needed for KFP v2
            job_name=f'{pipeline_name}-run',
            version_id=pipeline_version.pipeline_version_id
        )

        print(f'Run ID: {run.run_id}')
        with open('$(results.run-id.path)', 'w') as f:
            f.write(run.run_id)

        # Wait if requested
        if "$(params.wait-for-completion)" == "true":
            print('Waiting for completion...')
            client.wait_for_run_completion(run.run_id, timeout=int("$(params.timeout)"))
            status = client.get_run(run.run_id).run.status
            print(f'Status: {status}')
            with open('$(results.status.path)', 'w') as f:
                f.write(status)
            if status != 'Succeeded':
                sys.exit(1)
        else:
            with open('$(results.status.path)', 'w') as f:
                f.write('Running')

        EOF

        echo "✅ Task completed"
{{- end }}

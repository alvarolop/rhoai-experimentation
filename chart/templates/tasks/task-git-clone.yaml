{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
spec:
  params:
    - name: url
      type: string
      description: Git repository URL
    - name: revision
      type: string
      description: Git revision to checkout (branch, tag, sha)
      default: main
    - name: subdirectory
      type: string
      description: Subdirectory inside workspace to clone into
      default: ""
  workspaces:
    - name: output
      description: The git repo will be cloned here
  steps:
    - name: clone
      image: gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/git-init:latest
      script: |
        #!/bin/sh
        set -e

        CHECKOUT_DIR="$(workspaces.output.path)/$(params.subdirectory)"

        echo "Cloning $(params.url) at revision $(params.revision) into ${CHECKOUT_DIR}"

        /ko-app/git-init \
          -url "$(params.url)" \
          -revision "$(params.revision)" \
          -path "${CHECKOUT_DIR}"

        cd "${CHECKOUT_DIR}"
        echo "Repository cloned successfully"
        ls -la
{{- end }}

---
{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-kfp-pipeline
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rhoai-pipelines-demo.labels" . | nindent 4 }}
spec:
  params:
    - name: pipeline-id
      type: string
    - name: dsp-api-url
      type: string
    - name: namespace
      type: string
  results:
    - name: run-id
      description: ID of the pipeline run
  steps:
    - name: trigger-run
      image: {{ .Values.tekton.image }}
      script: |
        #!/bin/bash
        set -e
        echo "Triggering pipeline run for pipeline: $(params.pipeline-id)"
        echo "DSP API: $(params.dsp-api-url)"
        echo "Namespace: $(params.namespace)"

        RUN_ID="$(params.pipeline-id)-run-$(date +%s)"
        echo "Generated run ID: ${RUN_ID}"
        echo -n "${RUN_ID}" > $(results.run-id.path)

        echo "Pipeline run triggered successfully"
        echo "Run ID: ${RUN_ID}"
{{- end }}

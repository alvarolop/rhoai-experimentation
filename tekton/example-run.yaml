apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: fraud-detection-run-
  namespace: rhoai-playground
spec:
  pipelineRef:
    name: deploy-kfp-pipeline
  params:
    - name: git-url
      value: https://github.com/alvarolop/rhoai-experimentation.git
    - name: git-revision
      value: main
    - name: pipeline-path
      value: pipelines/fraud-detection
    - name: pipeline-name
      value: fraud-detection-pipeline
    - name: pipeline-file
      value: pipeline.py
    - name: wait-for-completion
      value: "true"
    - name: timeout
      value: "3600"
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: pipeline-workspace
    # Uncomment for SSH authentication (if git.auth.enabled=true and git.auth.type=ssh)
    # - name: git-ssh-credentials
    #   secret:
    #     secretName: git-auth-ssh
    # Uncomment for basic authentication (if git.auth.enabled=true and git.auth.type=basic)
    # - name: git-basic-credentials
    #   secret:
    #     secretName: git-auth-basic

---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ci-kfp-pipeline-run-
  namespace: rhoai-playground
  annotations:
    description: |
      CI/CD pipeline for KFP pipeline code.
      Clones repo, lints code, compiles pipeline, and uploads definition to DSP.
      Use this when pipeline code changes.
spec:
  pipelineRef:
    name: ci-kfp-pipeline
  params:
    - name: git-url
      value: https://github.com/alvarolop/rhoai-experimentation.git
    - name: git-revision
      value: main
    - name: pipeline-path
      value: pipelines/fraud-detection
    - name: pipeline-name
      value: fraud-detection-pipeline
    - name: pipeline-file
      value: pipeline.py
    - name: pipeline-description
      value: "Fraud Detection ML Pipeline - Automated CI/CD Upload"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    # Uncomment for SSH authentication (if git.auth.enabled=true and git.auth.type=ssh)
    # - name: git-ssh-credentials
    #   secret:
    #     secretName: git-auth-ssh
    # Uncomment for basic authentication (if git.auth.enabled=true and git.auth.type=basic)
    # - name: git-basic-credentials
    #   secret:
    #     secretName: git-auth-basic
